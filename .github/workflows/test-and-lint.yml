name: Lint and Test

on:
  workflow_call:

jobs:
  test-and-lint:
    name: Type-check, Test, Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: |
          echo "::add-matcher::.github/problem-matchers/tsc.json"
          npm run typecheck
          echo "::remove-matcher owner=tsc::"

      - name: Test
        run: CI=true npm test

      - name: Lint
        run: |
          echo "::add-matcher::.github/problem-matchers/eslint.json"
          npm run lint
          echo "::remove-matcher owner=eslint::"

      - name: Check formatting
        run: |
          npm run format
          if ! git diff --exit-code --quiet; then
            echo "::error::Code is not formatted. Run 'npm run format' locally and commit the changes."
            git diff --name-only
            exit 1
          fi
